services:
  - type: web
    name: truthlens-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

# -------------------------------------------------------------------------
# MANUAL CONFIGURATION REQUIRED AFTER CONNECTING REPOSITORY TO RENDER
# -------------------------------------------------------------------------
# 1. Set GEMINI_API_KEY in the Render dashboard -> Environment tab
# 2. Set GROQ_API_KEY in the Render dashboard -> Environment tab
# 3. Set SERPER_API_KEY in the Render dashboard -> Environment tab
# 4. Set ALLOWED_ORIGINS to your deployed frontend URL plus local dev origins
#    Example: https://your-vercel-production-domain.vercel.app,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
# -------------------------------------------------------------------------
