services:
  - type: web
    name: truthlens-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

# -------------------------------------------------------------------------
# MANUAL CONFIGURATION REQUIRED AFTER CONNECTING REPOSITORY TO RENDER
# -------------------------------------------------------------------------
# 1. Set GEMINI_API_KEY in the Render dashboard -> Environment tab
# 2. Set GROQ_API_KEY in the Render dashboard -> Environment tab
# 3. Set SERPER_API_KEY in the Render dashboard -> Environment tab
# -------------------------------------------------------------------------
